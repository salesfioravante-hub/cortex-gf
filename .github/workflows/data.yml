name: Atualizar dados (24h)

# Verificação 24h: busca as fontes abertas, valida e faz commit dos JSON.
# Requer que a RAIZ do repositório seja a pasta cortex-gf/ (onde ficam scripts/ e data/).
# Se o repo tiver a pasta em outro nível, ajuste os caminhos e mova .github/ para a raiz.

on:
  schedule:
    - cron: "0 */4 * * *"   # a cada 4h — mantém preço/técnico do TradingView frescos (intradiário)
    - cron: "30 20 * * 5"   # sexta 20:30 UTC — logo após o release do COT (15:30 ET)
  workflow_dispatch: {}     # permite rodar manualmente pelo botão do GitHub

permissions:
  contents: write           # necessário para o bot commitar os dados

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0        # histórico completo: necessário para o rebase antes do push
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ingestão COT (CFTC)
        run: node scripts/fetch-cot.mjs

      - name: Ingestão preço + técnico (TradingView)
        run: node scripts/fetch-prices.mjs

      - name: Ingestão FRED (regime / juro real / macro)
        run: node scripts/fetch-fred.mjs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      - name: Ingestão calendário econômico (FRED / FMP / ForexFactory)
        run: node scripts/fetch-calendar.mjs
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}   # fonte principal (datas dos dados dos EUA)
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        continue-on-error: true    # calendário indisponível não derruba o resto

      - name: Ingestão notícias (RSS bancos centrais)
        run: node scripts/fetch-news.mjs
        continue-on-error: true

      - name: Montar bundle
        run: node scripts/build-bundle.mjs

      - name: Commit dos dados
        run: |
          set -e
          git config user.name  "gf-quant-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados — nada a commitar."
            exit 0
          fi
          git commit -m "chore(data): atualiza dados $(date -u +%F)"
          # O remoto pode ter avançado enquanto o job rodava (push manual, outra execução).
          # Sem isto o push é rejeitado e o dado do dia se perde silenciosamente.
          for i in 1 2 3; do
            if git pull --rebase --autostash origin main && git push origin HEAD:main; then
              echo "Dados publicados (tentativa $i)."
              exit 0
            fi
            echo "Tentativa $i falhou — o remoto mudou. Repetindo em 5s..."
            sleep 5
          done
          echo "ERRO: não foi possível publicar os dados após 3 tentativas."
          exit 1
